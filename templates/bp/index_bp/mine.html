<!-- 文件路径：templates/index.html -->
{% extends "base/index_base.html" %}

<!-- 覆盖父模板的 title block -->
{% block title %}清玉 - 我的{% endblock %}

<!-- 填充父模板的 content block -->
{% block content %}
<style>
    /* 全局样式重置 */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* 主容器 */
    .profile-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    /* 个人信息头部 */
    .profile-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 48px;
    }

    /* 头像 */
    .avatar {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background-color: #f3f4f6;
        margin-bottom: 24px;
    }

    /* 用户名 */
    .username {
        font-size: 2rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 8px;
    }

    /* 签名 */
    .signature {
        color: #6b7280;
        margin-bottom: 24px;
        font-size: 1rem;
    }

    /* 按钮组 */
    .button-group {
        display: flex;
        gap: 16px;
    }

    /* 基础按钮样式 */
    .btn {
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-block;
        border: none;
    }

    /* 编辑签名按钮 */
    .btn-outline-blue {
        background-color: white;
        border: 1px solid #3b82f6;
        color: #3b82f6;
    }

    .btn-outline-blue:hover {
        background-color: #eff6ff;
    }

    /* 退出登录按钮 */
    .btn-solid-red {
        background-color: #ef4444;
        color: white;
    }

    .btn-solid-red:hover {
        background-color: #dc2626;
    }

    /* 分割线 */
    .divider {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin-bottom: 32px;
    }

    /* 账号管理标题 */
    .section-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #111827;
        margin-bottom: 24px;
        border-left: 4px solid #3b82f6;
        padding-left: 12px;
    }

    /* 账号管理卡片容器 */
    .account-cards {
        background-color: white;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        overflow: hidden;
    }

    /* 单个卡片样式 */
    .account-card {
        padding: 24px;
        display: flex;
        align-items: center;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .account-card:hover {
        background-color: #f9fafb;
    }

    .account-card:not(:last-child) {
        border-bottom: 1px solid #e5e7eb;
    }

    /* 卡片图标容器 */
    .card-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
    }

    .icon-blue {
        background-color: #eff6ff;
    }

    .icon-green {
        background-color: #ecfdf5;
    }

    /* 卡片文字 */
    .card-title {
        font-weight: 500;
        color: #111827;
        margin-bottom: 4px;
    }

    .card-subtitle {
        font-size: 0.875rem;
        color: #6b7280;
    }

    /* 模态框遮罩 */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        display: none;
    }

    /* 模态框内容 */
    .modal-content {
        background-color: white;
        border-radius: 8px;
        padding: 24px;
        width: 100%;
        max-width: 400px;
        margin: 0 16px;
    }

    /* 模态框标题 */
    .modal-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 16px;
        color: #111827;
    }

    /* 表单组 */
    .form-group {
        margin-bottom: 16px;
    }

    /* 表单标签 */
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #374151;
        margin-bottom: 8px;
    }

    /* 表单输入框 */
    .form-input, .form-textarea {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus, .form-textarea:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* 文本域 */
    .form-textarea {
        resize: vertical;
        min-height: 80px;
    }

    /* 提示文字 */
    .form-hint {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 16px;
    }

    /* 模态框按钮组 */
    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    /* 取消按钮 */
    .btn-outline-gray {
        background-color: white;
        border: 1px solid #d1d5db;
        color: #374151;
    }

    .btn-outline-gray:hover {
        background-color: #f9fafb;
    }

    /* 确认按钮 */
    .btn-solid-blue {
        background-color: #3b82f6;
        color: white;
    }

    .btn-solid-blue:hover {
        background-color: #2563eb;
    }

    /* 响应式设计 */
    @media (max-width: 640px) {
        .profile-container {
            padding: 24px 16px;
        }

        .username {
            font-size: 1.5rem;
        }

        .button-group {
            flex-direction: column;
            width: 100%;
        }

        .btn {
            width: 100%;
            text-align: center;
        }
    }
</style>

<div class="profile-container">
    <!-- 个人信息头部 -->
    <div class="profile-header">
        <!-- 头像 -->
        <div class="avatar"></div>

        <!-- 用户名 -->
        <h1 class="username">{{ session.username }}</h1>

        <!-- 签名 -->
        <p class="signature">
            {% if user.signature %}
                {{ user.signature }}
            {% else %}
                暂无签名
            {% endif %}
        </p>

        <!-- 操作按钮 -->
        <div class="button-group">
            <button
                type="button"
                class="btn btn-outline-blue"
                onclick="openSignatureModal()">
                编辑签名
            </button>
            <a
                href="{{ url_for('index_bp.logout') }}"
                class="btn btn-solid-red">
                退出登录
            </a>
        </div>
    </div>

    <!-- 分割线 -->
    <hr class="divider">

    <!-- 账号管理 -->
    <div>
        <h2 class="section-title">账号管理</h2>

        <div class="account-cards">
            <!-- 基本资料 -->
            <div class="account-card" onclick="openUsernameModal()">
                <div class="card-icon icon-blue">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="card-title">基本资料</h3>
                    <p class="card-subtitle">修改用户名</p>
                </div>
            </div>

            <!-- 账号安全 -->
            <div class="account-card" onclick="openPasswordModal()">
                <div class="card-icon icon-green">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="card-title">账号安全</h3>
                    <p class="card-subtitle">修改登录密码</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 编辑签名模态框 -->
<div id="signatureModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="modal-title">编辑签名</h3>
        <form action="{{ url_for('index_bp.update_signature') }}" method="POST">
            <div class="form-group">
                <textarea
                    name="signature"
                    class="form-textarea"
                    placeholder="请输入您的签名（最多255个字符）"
                    maxlength="255">{% if user.signature %}{{ user.signature }}{% endif %}</textarea>
            </div>
            <div class="modal-buttons">
                <button
                    type="button"
                    class="btn btn-outline-gray"
                    onclick="closeSignatureModal()">
                    取消
                </button>
                <button
                    type="submit"
                    class="btn btn-solid-blue">
                    保存
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 修改用户名模态框 -->
<div id="usernameModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="modal-title">修改用户名</h3>
        <form action="{{ url_for('index_bp.update_username') }}" method="POST">
            <div class="form-group">
                <label class="form-label">新用户名</label>
                <input
                    type="text"
                    name="username"
                    class="form-input"
                    placeholder="请输入新用户名（最多255个字符）"
                    maxlength="255"
                    required>
            </div>
            <div class="form-hint">
                提示：修改用户名后需要重新登录
            </div>
            <div class="modal-buttons">
                <button
                    type="button"
                    class="btn btn-outline-gray"
                    onclick="closeUsernameModal()">
                    取消
                </button>
                <button
                    type="submit"
                    class="btn btn-solid-blue">
                    确认修改
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 修改密码模态框 -->
<div id="passwordModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="modal-title">修改密码</h3>
        <form action="{{ url_for('index_bp.update_password') }}" method="POST">
            <div class="form-group">
                <label class="form-label">当前密码</label>
                <input
                    type="password"
                    name="raw_password"
                    class="form-input"
                    placeholder="请输入当前密码"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label">新密码</label>
                <input
                    type="password"
                    name="new_password1"
                    class="form-input"
                    placeholder="请输入新密码（最多20个字符）"
                    maxlength="20"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input
                    type="password"
                    name="new_password2"
                    class="form-input"
                    placeholder="请再次输入新密码"
                    maxlength="20"
                    required>
            </div>
            <div class="form-hint">
                提示：修改密码后需要重新登录
            </div>
            <div class="modal-buttons">
                <button
                    type="button"
                    class="btn btn-outline-gray"
                    onclick="closePasswordModal()">
                    取消
                </button>
                <button
                    type="submit"
                    class="btn btn-solid-blue">
                    确认修改
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // 编辑签名模态框
    function openSignatureModal() {
        document.getElementById('signatureModal').style.display = 'flex';
    }

    function closeSignatureModal() {
        document.getElementById('signatureModal').style.display = 'none';
    }

    // 修改用户名模态框
    function openUsernameModal() {
        document.getElementById('usernameModal').style.display = 'flex';
    }

    function closeUsernameModal() {
        document.getElementById('usernameModal').style.display = 'none';
    }

    // 修改密码模态框
    function openPasswordModal() {
        document.getElementById('passwordModal').style.display = 'flex';
    }

    function closePasswordModal() {
        document.getElementById('passwordModal').style.display = 'none';
    }

    // 点击模态框外部关闭
    window.onclick = function(event) {
        if (event.target.id === 'signatureModal') {
            closeSignatureModal();
        }
        if (event.target.id === 'usernameModal') {
            closeUsernameModal();
        }
        if (event.target.id === 'passwordModal') {
            closePasswordModal();
        }
    }
</script>
{% endblock %}
