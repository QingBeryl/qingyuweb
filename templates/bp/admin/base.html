<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}清玉芳后台管理{% endblock %}</title>
    <link rel="stylesheet" href="/static/bp/admin/css/style.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>清玉芳后台</h2>
                <p>欢迎, {{ username }}</p>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin.dashboard') }}" class="nav-item {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
                    <span>📊</span> 仪表盘
                </a>
                <a href="{{ url_for('admin.users') }}" class="nav-item {% if request.endpoint == 'admin.users' %}active{% endif %}">
                    <span>👥</span> 用户管理
                </a>
                <a href="{{ url_for('admin.keys') }}" class="nav-item {% if request.endpoint == 'admin.keys' %}active{% endif %}">
                    <span>🔑</span> 密钥管理
                </a>
                <a href="{{ url_for('admin.login_logs') }}" class="nav-item {% if request.endpoint == 'admin.login_logs' %}active{% endif %}">
                    <span>📝</span> 登录日志
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="{{ url_for('admin.logout') }}" class="logout-btn">退出登录</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/bp/admin/js/main.js"></script>
</body>
</html>
