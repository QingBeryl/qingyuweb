<!-- 文件路径：templates/index.html -->
{% extends "base/index_base.html" %}

<!-- 覆盖父模板的 title block -->
{% block title %}清玉 - 我的{% endblock %}

<!-- 填充父模板的 content block -->
{% block content %}
<style>
    .empty-page-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 64px); /* 减去导航栏高度 */
        padding: 20px;
    }

    .empty-page-image {
        max-width: 100%;
        max-height: 60vh;
        object-fit: contain;
    }
</style>

<div class="empty-page-container">
    <img src="/static/bp/index_bp/images/页面内容为空.png" alt="页面内容为空" class="empty-page-image">
</div>
{% endblock %}
